<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Asimov 1 — Interactive Build Tour</title>
<style>
  :root { --bg:#14171c; --panel:#1d2129; --text:#dfe3ea; --dim:#8b93a3;
          --accent:#e8a33d; --ok:#4caf78; --fail:#e05555; --line:#2c313c; }
  * { box-sizing: border-box; margin: 0; }
  body { background: var(--bg); color: var(--text);
         font: 15px/1.55 "Segoe UI", system-ui, sans-serif;
         display: grid; height: 100vh; overflow: hidden;
         grid-template-columns: 360px 1fr 330px;
         grid-template-rows: 56px 1fr 64px;
         grid-template-areas: "head head head" "nar view tel" "nav nav nav"; }
  header { grid-area: head; display:flex; align-items:center; gap:14px;
           padding: 0 20px; border-bottom: 1px solid var(--line); }
  header h1 { font-size: 17px; font-weight: 600; }
  header .sub { color: var(--dim); font-size: 13px; }
  #narration { grid-area: nar; overflow-y: auto; padding: 20px 22px;
               background: var(--panel); border-right: 1px solid var(--line); }
  #narration h2 { color: var(--accent); font-size: 15px; margin-bottom: 10px;
                  text-transform: uppercase; letter-spacing: .06em; }
  #narration h3 { font-size: 14px; margin: 16px 0 6px; color: var(--text); }
  #narration p { margin: 8px 0; color: var(--dim); }
  #narration p b, #narration li b { color: var(--text); font-weight: 600; }
  #narration ul { margin: 8px 0 8px 18px; color: var(--dim); }
  #narration li { margin: 4px 0; }
  #narration table { border-collapse: collapse; margin: 10px 0; width: 100%;
                     font-size: 13px; }
  #narration td, #narration th { border: 1px solid var(--line); padding: 4px 8px;
                                 text-align: left; color: var(--dim); }
  #narration th { color: var(--text); }
  .actions { margin-top: 18px; display: flex; flex-direction: column; gap: 8px; }
  .actions button { background: var(--accent); color: #14171c; border: 0;
                    padding: 11px 14px; border-radius: 8px; font-size: 15px;
                    font-weight: 600; cursor: pointer; text-align: left; }
  .actions button:hover { filter: brightness(1.1); }
  .actions button:disabled { background: #3a3f4b; color: var(--dim); cursor: wait; }
  #view { grid-area: view; position: relative; }
  #view canvas { display: block; }
  #hint { position: absolute; bottom: 10px; left: 12px; color: var(--dim);
          font-size: 12px; pointer-events: none; }
  #busy { position: absolute; top: 12px; left: 12px; color: var(--accent);
          font-size: 13px; font-weight: 600; display: none; }
  #telemetry { grid-area: tel; background: var(--panel); overflow-y: auto;
               border-left: 1px solid var(--line); padding: 16px; }
  #telemetry h2 { font-size: 13px; color: var(--dim); text-transform: uppercase;
                  letter-spacing: .06em; margin-bottom: 10px; }
  .gauges { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
  .gauge { background: var(--bg); border: 1px solid var(--line); border-radius: 8px;
           padding: 8px 10px; }
  .gauge .v { font-size: 19px; font-weight: 600; }
  .gauge .l { font-size: 11px; color: var(--dim); }
  #results { font-size: 13px; }
  .res { padding: 6px 8px; border-radius: 6px; margin-bottom: 4px; background: var(--bg); }
  .res.ok { border-left: 3px solid var(--ok); }
  .res.fail { border-left: 3px solid var(--fail); }
  .res.info { border-left: 3px solid var(--line); color: var(--dim);
              font-family: Consolas, monospace; font-size: 12px; }
  .res .d { color: var(--dim); font-size: 12px; }
  nav { grid-area: nav; display: flex; align-items: center; gap: 6px;
        padding: 0 20px; border-top: 1px solid var(--line); }
  nav .step { flex: 1; text-align: center; padding: 10px 6px; border-radius: 8px;
              color: var(--dim); font-size: 13px; cursor: pointer;
              border: 1px solid transparent; }
  nav .step:hover { border-color: var(--line); }
  nav .step.active { color: var(--accent); border-color: var(--accent); font-weight: 600; }
  nav .arrow { background: none; color: var(--text); border: 1px solid var(--line);
               border-radius: 8px; padding: 10px 18px; font-size: 15px; cursor: pointer; }
</style>
</head>
<body>
<header>
  <h1>Asimov 1 — Interactive Build Tour</h1>
  <span class="sub">a $16,000 humanoid robot, built virtually piece by piece</span>
</header>
<div id="narration"></div>
<div id="view"><div id="busy">▶ running…</div><div id="hint">drag to orbit · scroll to zoom · right-drag to pan</div></div>
<div id="telemetry">
  <h2>Telemetry</h2>
  <div class="gauges" id="gauges"></div>
  <h2>Test console</h2>
  <div id="results"><div class="res info">no tests run yet</div></div>
</div>
<nav id="nav"></nav>
<script type="importmap">
{ "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
} }
</script>
<script type="module" src="app.js"></script>
</body>
</html>
